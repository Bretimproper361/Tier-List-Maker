<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Tier List Maker</title>
        <style>
            :root {
                --bg-color: #1a1a1a;
                --text-color: #ffffff;
                --panel-color: #2a2a2a;
            }
            body {
                font-family: sans-serif;
                background-color: var(--bg-color);
                color: var(--text-color);
                margin: 20px;
                user-select: none;
            }

            /* Main Workspace Layout Wrapper */
            .workspace-container {
                display: flex;
                flex-direction: column;
                gap: 20px;
                transition: flex-direction 0.3s ease;
            }
            .workspace-container.sidebar-mode {
                flex-direction: row;
                align-items: flex-start;
            }
            .workspace-container.sidebar-mode #tier-board {
                flex-grow: 1;
                width: 70%;
            }
            .workspace-container.sidebar-mode .image-bank-container {
                width: 28%;
                position: sticky;
                top: 20px;
                max-height: 85vh;
                display: flex;
                flex-direction: column;
            }
            .workspace-container.sidebar-mode #image-bank {
                flex-grow: 1;
                overflow-y: auto;
                max-height: 70vh;
            }

            /* Toolbar */
            .toolbar {
                background: var(--panel-color);
                padding: 15px;
                border-radius: 8px;
                margin-bottom: 20px;
                display: flex;
                gap: 15px;
                align-items: center;
                flex-wrap: wrap;
            }
            button,
            input[type="file"],
            select {
                padding: 8px 12px;
                border-radius: 4px;
                border: none;
                background: #444;
                color: #fff;
                cursor: pointer;
            }
            button:hover {
                background: #555;
            }
            .btn-layout-toggle {
                background: #2b5c8f;
            }
            .btn-layout-toggle:hover {
                background: #3a7bc0;
            }

            /* Trash Zone */
            .trash-zone {
                background: #5a1818;
                border: 2px dashed #ff4444;
                color: #ff9999;
                padding: 10px 20px;
                border-radius: 4px;
                font-weight: bold;
                display: flex;
                align-items: center;
                justify-content: center;
                transition: background 0.2s;
            }
            .trash-zone.drag-over {
                background: #8a1818;
                color: #fff;
            }

            /* Tier Board */
            .tier-board {
                display: flex;
                flex-direction: column;
                gap: 5px;
                margin-bottom: 20px;
            }
            .tier-row {
                display: flex;
                background: #111;
                min-height: 80px;
                border: 1px solid #333;
            }

            /* Reorder Handle Column */
            .tier-handle {
                width: 30px;
                background: #222;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                gap: 8px;
                border-right: 1px solid #333;
                flex-shrink: 0;
            }
            .handle-btn {
                background: none;
                border: none;
                color: #666;
                font-size: 14px;
                padding: 2px;
                cursor: pointer;
            }
            .handle-btn:hover {
                color: #fff;
            }

            /* Tier Label Column Fixes */
            .tier-label {
                width: 140px;
                min-width: 140px;
                max-width: 140px;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 10px;
                text-align: center;
                font-weight: bold;
                color: #000;
                cursor: pointer;
                transition: filter 0.1s;
                box-sizing: border-box;
                word-break: break-word;
                overflow-wrap: break-word;
            }
            .tier-label:hover {
                filter: brightness(1.1);
            }
            .tier-label span {
                width: 100%;
                display: -webkit-box;
                -webkit-line-clamp: 4;
                -webkit-box-orient: vertical;
                overflow: hidden;
            }

            /* Image Grids */
            .tier-items {
                display: flex;
                flex-wrap: wrap;
                align-content: flex-start;
                gap: 4px;
                padding: 4px;
                flex-grow: 1;
                min-height: 72px;
            }
            .image-bank-container {
                background: var(--panel-color);
                padding: 15px;
                border-radius: 8px;
            }
            .image-bank {
                display: flex;
                flex-wrap: wrap;
                gap: 6px;
                min-height: 150px;
                background: #151515;
                padding: 10px;
                border-radius: 4px;
                border: 2px dashed #444;
            }

            /* Layout Isolation Containers */
            .tier-item-wrap {
                width: 70px;
                height: 70px;
                position: relative;
                display: inline-block;
            }

            /* Core Item Images Layout Base Styling */
            .tier-item-img {
                width: 70px;
                height: 70px;
                cursor: grab;
                transition:
                    transform 0.15s cubic-bezier(0.2, 0.8, 0.2, 1),
                    box-shadow 0.15s ease-out;
                transform-origin: center center;
                position: absolute;
                top: 0;
                left: 0;
                z-index: 1;
            }

            /* Enhanced Performance Zoom Effect Overlays & Description Tooltips */
            .tier-item-wrap:hover .tier-item-img {
                transform: scale(2.2);
                z-index: 100;
                box-shadow: 0px 8px 24px rgba(0, 0, 0, 0.85);
                border-radius: 2px;
                width: auto !important;
                max-width: 300px;
                object-fit: contain !important;
            }

            /* Tooltip Description Settings */
            .item-tooltip {
                position: absolute;
                top: 115px;
                left: 50%;
                transform: translateX(-50%);
                background: rgba(0, 0, 0, 0.9);
                color: #fff;
                padding: 6px 10px;
                border-radius: 4px;
                font-size: 11px;
                white-space: normal;
                width: 130px;
                text-align: center;
                z-index: 101;
                pointer-events: none;
                opacity: 0;
                visibility: hidden;
                transition:
                    opacity 0.15s ease,
                    visibility 0.15s ease;
                box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
                border: 1px solid #444;
                word-break: break-word;
            }
            .tier-item-wrap:hover .item-tooltip {
                opacity: 1;
                visibility: visible;
            }

            .fit-square {
                width: 70px;
                object-fit: cover;
            }
            .fit-aspect {
                position: relative;
                width: auto;
                object-fit: contain;
            }

            /* Custom alignment fix override settings */
            .aspect-mode-active .tier-item-wrap {
                width: auto;
                min-width: 40px;
            }
            .aspect-mode-active .tier-item-img {
                position: relative;
            }
            .aspect-mode-active .tier-item-wrap:hover .tier-item-img {
                position: absolute;
            }

            /* Modal Popup Windows */
            .modal-overlay {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0, 0, 0, 0.7);
                display: flex;
                align-items: center;
                justify-content: center;
                z-index: 1000;
                visibility: hidden;
                opacity: 0;
                transition:
                    opacity 0.2s,
                    visibility 0.2s;
            }
            .modal-overlay.active {
                visibility: visible;
                opacity: 1;
            }
            .modal-content {
                background: #2a2a2a;
                padding: 20px;
                border-radius: 8px;
                width: 320px;
                display: flex;
                flex-direction: column;
                gap: 15px;
                box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            }
            .modal-content label {
                font-weight: bold;
                display: flex;
                flex-direction: column;
                gap: 5px;
            }
            .modal-content input[type="text"],
            .modal-content textarea {
                padding: 8px;
                background: #444;
                border: none;
                color: #fff;
                border-radius: 4px;
                font-family: sans-serif;
            }
            .modal-content textarea {
                resize: vertical;
                height: 80px;
            }
            .modal-actions {
                display: flex;
                justify-content: space-between;
                margin-top: 10px;
            }
            .btn-danger {
                background: #8a1818;
            }
            .btn-danger:hover {
                background: #aa2222;
            }

            /* Preview Image Inside Item Modal */
            .modal-img-preview {
                max-width: 100%;
                max-height: 150px;
                object-fit: contain;
                border-radius: 4px;
                margin: 0 auto;
                display: block;
                background: #111;
                padding: 5px;
            }
        </style>
    </head>
    <body>
        <h1>Tier List Maker</h1>

        <!-- Action Toolbar -->
        <div class="toolbar">
            <input type="file" id="image-loader" multiple accept="image/*" />
            <button id="add-url-btn">Add Image URL</button>
            <button id="add-tier-btn">Add New Tier</button>
            <select id="aspect-ratio-select">
                <option value="square">Force Square (Crop)</option>
                <option value="aspect">Keep Aspect Ratio</option>
            </select>
            <button id="layout-toggle-btn" class="btn-layout-toggle">
                ↔ Switch to Sidebar Bank
            </button>
            <button id="export-json-btn">Export JSON</button>
            <button id="import-json-btn">Import JSON</button>

            <!-- Drag-to-Delete Trash Area -->
            <div id="trash-zone" class="trash-zone">🗑️ Drag Here to Delete</div>
        </div>

        <div class="workspace-container" id="workspace">
            <!-- Tier Rows Container -->
            <div class="tier-board aspect-mode-inactive" id="tier-board"></div>

            <!-- Unused Image Bank -->
            <div class="image-bank-container">
                <h3>Image Bank</h3>
                <div
                    class="image-bank aspect-mode-inactive"
                    id="image-bank"
                ></div>
            </div>
        </div>

        <!-- Tier Actions Settings Popup Menu -->
        <div id="tier-modal" class="modal-overlay">
            <div class="modal-content">
                <h3>Edit Tier Settings</h3>
                <label>
                    Label Text:
                    <input type="text" id="modal-tier-name" />
                </label>
                <label>
                    Label Color:
                    <input type="color" id="modal-tier-color" />
                </label>
                <div class="modal-actions">
                    <button id="modal-delete-btn" class="btn-danger">
                        Delete Tier
                    </button>
                    <button id="modal-close-btn">Save & Close</button>
                </div>
            </div>
        </div>

        <!-- Item Detail Popup Modal (New Feature) -->
        <div id="item-modal" class="modal-overlay">
            <div class="modal-content">
                <h3>Item Custom Details</h3>
                <img
                    id="modal-item-preview"
                    class="modal-img-preview"
                    src=""
                    alt="Preview"
                />
                <label>
                    Description / Notes:
                    <textarea
                        id="modal-item-desc"
                        placeholder="Type an item description here..."
                    ></textarea>
                </label>
                <div class="modal-actions" style="justify-content: flex-end">
                    <button id="modal-item-save-btn">Save Changes</button>
                </div>
            </div>
        </div>

        <script>
            // --- Application State ---
            let state = {
                settings: { aspectRatio: "square", layout: "bottom" },
                tiers: [
                    { id: "t1", name: "S Tier", color: "#ff7f7f", images: [] },
                    { id: "t2", name: "A Tier", color: "#ffbf7f", images: [] },
                    { id: "t3", name: "B Tier", color: "#ffdf7f", images: [] },
                    { id: "t4", name: "C Tier", color: "#ffff7f", images: [] },
                ],
                bank: [],
                // Maps unique src or id strings to custom text descriptions
                descriptions: {},
            };

            let SilverDraggedElement = null;
            let activeModalTierId = null;
            let activeModalItemWrap = null;

            // --- Initial Setup ---
            document.addEventListener("DOMContentLoaded", () => {
                renderBoard();
                renderBank();
                setupEventListeners();
            });

            function updateGlobalAspectClass() {
                const board = document.getElementById("tier-board");
                const bank = document.getElementById("image-bank");
                if (state.settings.aspectRatio === "aspect") {
                    board.classList.add("aspect-mode-active");
                    board.classList.remove("aspect-mode-inactive");
                    bank.classList.add("aspect-mode-active");
                    bank.classList.remove("aspect-mode-inactive");
                } else {
                    board.classList.remove("aspect-mode-active");
                    board.classList.add("aspect-mode-inactive");
                    bank.classList.remove("aspect-mode-active");
                    bank.classList.add("aspect-mode-inactive");
                }
            }

            function setupEventListeners() {
                // File Input Loader
                document
                    .getElementById("image-loader")
                    .addEventListener("change", async (e) => {
                        const files = Array.from(e.target.files);
                        for (const file of files) {
                            await new Promise((resolve) => {
                                const reader = new FileReader();
                                reader.onload = (evt) => {
                                    state.bank.push(evt.target.result);
                                    resolve();
                                };
                                reader.onerror = () => resolve();
                                reader.readAsDataURL(file);
                            });
                        }
                        renderBank();
                        e.target.value = "";
                    });

                // Add Image URL Button
                document
                    .getElementById("add-url-btn")
                    .addEventListener("click", () => {
                        const url = prompt("Enter image URL:");
                        if (url) {
                            state.bank.push(url);
                            renderBank();
                        }
                    });

                // Add New Tier Button
                document
                    .getElementById("add-tier-btn")
                    .addEventListener("click", () => {
                        const newId = "t_" + Date.now();
                        state.tiers.push({
                            id: newId,
                            name: "New Tier",
                            color: "#a0a0a0",
                            images: [],
                        });
                        renderBoard();
                    });

                // Aspect Ratio Toggle
                document
                    .getElementById("aspect-ratio-select")
                    .addEventListener("change", (e) => {
                        state.settings.aspectRatio = e.target.value;
                        updateGlobalAspectClass();
                        document
                            .querySelectorAll(".tier-item-img")
                            .forEach((img) => {
                                img.className = `tier-item-img fit-${state.settings.aspectRatio}`;
                            });
                    });

                // Layout Direction Toggle (Sidebar vs Bottom Bank)
                document
                    .getElementById("layout-toggle-btn")
                    .addEventListener("click", () => {
                        const workspace = document.getElementById("workspace");
                        const toggleBtn =
                            document.getElementById("layout-toggle-btn");
                        if (state.settings.layout === "bottom") {
                            state.settings.layout = "sidebar";
                            workspace.classList.add("sidebar-mode");
                            toggleBtn.innerText = "⬇ Switch to Bottom Bank";
                        } else {
                            state.settings.layout = "bottom";
                            workspace.classList.remove("sidebar-mode");
                            toggleBtn.innerText = "↔ Switch to Sidebar Bank";
                        }
                    });

                // JSON Export
                document
                    .getElementById("export-json-btn")
                    .addEventListener("click", () => {
                        syncStateFromDOM();
                        const dataStr =
                            "data:text/json;charset=utf-8," +
                            encodeURIComponent(JSON.stringify(state));
                        const downloadAnchor = document.createElement("a");
                        downloadAnchor.setAttribute("href", dataStr);
                        downloadAnchor.setAttribute(
                            "download",
                            "tier-list.json",
                        );
                        document.body.appendChild(downloadAnchor);
                        downloadAnchor.click();
                        downloadAnchor.remove();
                    });

                // JSON Import
                document
                    .getElementById("import-json-btn")
                    .addEventListener("click", () => {
                        const input = document.createElement("input");
                        input.type = "file";
                        input.accept = ".json";
                        input.onchange = (e) => {
                            const file = e.target.files[0];
                            const reader = new FileReader();
                            reader.onload = (evt) => {
                                try {
                                    const parsed = JSON.parse(
                                        evt.target.result,
                                    );
                                    if (parsed.tiers && parsed.bank) {
                                        state = parsed;
                                        if (!state.descriptions)
                                            state.descriptions = {};

                                        document.getElementById(
                                            "aspect-ratio-select",
                                        ).value =
                                            state.settings.aspectRatio ||
                                            "square";

                                        const workspace =
                                            document.getElementById(
                                                "workspace",
                                            );
                                        const toggleBtn =
                                            document.getElementById(
                                                "layout-toggle-btn",
                                            );
                                        if (
                                            state.settings.layout === "sidebar"
                                        ) {
                                            workspace.classList.add(
                                                "sidebar-mode",
                                            );
                                            toggleBtn.innerText =
                                                "⬇ Switch to Bottom Bank";
                                        } else {
                                            workspace.classList.remove(
                                                "sidebar-mode",
                                            );
                                            toggleBtn.innerText =
                                                "↔ Switch to Sidebar Bank";
                                        }

                                        updateGlobalAspectClass();
                                        renderBoard();
                                        renderBank();
                                    } else {
                                        alert("Invalid JSON format structure.");
                                    }
                                } catch (err) {
                                    alert(
                                        "Error reading JSON file formatting.",
                                    );
                                }
                            };
                            reader.readAsText(file);
                        };
                        input.click();
                    });

                // Trash Zone Drag and Drop Handlers
                const trashZone = document.getElementById("trash-zone");
                trashZone.addEventListener("dragover", (e) => {
                    e.preventDefault();
                    trashZone.classList.add("drag-over");
                });
                trashZone.addEventListener("dragleave", () => {
                    trashZone.classList.remove("drag-over");
                });
                trashZone.addEventListener("drop", (e) => {
                    e.preventDefault();
                    trashZone.classList.remove("drag-over");
                    if (SilverDraggedElement) {
                        SilverDraggedElement.closest(
                            ".tier-item-wrap",
                        ).remove();
                        syncStateFromDOM();
                    }
                });

                // Row Setting Modal Configuration Controls
                document
                    .getElementById("modal-close-btn")
                    .addEventListener("click", closeModal);
                document
                    .getElementById("modal-delete-btn")
                    .addEventListener("click", () => {
                        if (
                            confirm(
                                "Are you absolutely sure you want to delete this tier row? Images inside will return to your bank pool.",
                            )
                        ) {
                            const tier = state.tiers.find(
                                (t) => t.id === activeModalTierId,
                            );
                            if (tier) {
                                state.bank.push(...tier.images);
                                state.tiers = state.tiers.filter(
                                    (t) => t.id !== activeModalTierId,
                                );
                                closeModal();
                                renderBoard();
                                renderBank();
                            }
                        }
                    });

                // Item Detail Modal Actions
                document
                    .getElementById("modal-item-save-btn")
                    .addEventListener("click", () => {
                        if (activeModalItemWrap) {
                            const img =
                                activeModalItemWrap.querySelector(
                                    ".tier-item-img",
                                );
                            const descText = document
                                .getElementById("modal-item-desc")
                                .value.trim();

                            if (descText) {
                                state.descriptions[img.src] = descText;
                            } else {
                                delete state.descriptions[img.src];
                            }

                            // Dynamically update or clear the hidden tooltips container
                            let tooltip =
                                activeModalItemWrap.querySelector(
                                    ".item-tooltip",
                                );
                            if (descText) {
                                if (!tooltip) {
                                    tooltip = document.createElement("div");
                                    tooltip.className = "item-tooltip";
                                    activeModalItemWrap.appendChild(tooltip);
                                }
                                tooltip.innerText = descText;
                            } else if (tooltip) {
                                tooltip.remove();
                            }
                        }
                        document
                            .getElementById("item-modal")
                            .classList.remove("active");
                        activeModalItemWrap = null;
                    });
            }

            function openModal(tierId) {
                activeModalTierId = tierId;
                const tier = state.tiers.find((t) => t.id === tierId);
                if (!tier) return;

                document.getElementById("modal-tier-name").value = tier.name;
                document.getElementById("modal-tier-color").value = tier.color;
                document.getElementById("tier-modal").classList.add("active");
            }

            function closeModal() {
                const tier = state.tiers.find(
                    (t) => t.id === activeModalTierId,
                );
                if (tier) {
                    tier.name =
                        document.getElementById("modal-tier-name").value;
                    tier.color =
                        document.getElementById("modal-tier-color").value;
                    renderBoard();
                }
                document
                    .getElementById("tier-modal")
                    .classList.remove("remove");
                document
                    .getElementById("tier-modal")
                    .classList.remove("active");
                activeModalTierId = null;
            }

            function openItemModal(wrapperElement) {
                activeModalItemWrap = wrapperElement;
                const img = wrapperElement.querySelector(".tier-item-img");
                const savedDesc = state.descriptions[img.src] || "";

                document.getElementById("modal-item-preview").src = img.src;
                document.getElementById("modal-item-desc").value = savedDesc;
                document.getElementById("item-modal").classList.add("active");
            }

            // --- Rendering Logic Engine ---

            function renderBoard() {
                const board = document.getElementById("tier-board");
                board.innerHTML = "";
                updateGlobalAspectClass();

                state.tiers.forEach((tier, index) => {
                    const row = document.createElement("div");
                    row.className = "tier-row";
                    row.dataset.id = tier.id;

                    const handleCol = document.createElement("div");
                    handleCol.className = "tier-handle";

                    const upBtn = document.createElement("button");
                    upBtn.className = "handle-btn";
                    upBtn.innerHTML = "▲";
                    upBtn.disabled = index === 0;
                    upBtn.addEventListener("click", () =>
                        moveTierOrder(index, -1),
                    );

                    const downBtn = document.createElement("button");
                    downBtn.className = "handle-btn";
                    downBtn.innerHTML = "▼";
                    downBtn.disabled = index === state.tiers.length - 1;
                    downBtn.addEventListener("click", () =>
                        moveTierOrder(index, 1),
                    );

                    handleCol.appendChild(upBtn);
                    handleCol.appendChild(downBtn);

                    const label = document.createElement("div");
                    label.className = "tier-label";
                    label.style.backgroundColor = tier.color;
                    label.addEventListener("click", () => openModal(tier.id));

                    const nameDisplay = document.createElement("span");
                    nameDisplay.innerText = tier.name;

                    label.appendChild(nameDisplay);

                    const itemsContainer = document.createElement("div");
                    itemsContainer.className = "tier-items";
                    setupDropContainer(itemsContainer);

                    tier.images.forEach((src) => {
                        itemsContainer.appendChild(
                            createImageWrapperElement(src),
                        );
                    });

                    row.appendChild(handleCol);
                    row.appendChild(label);
                    row.appendChild(itemsContainer);
                    board.appendChild(row);
                });
            }

            function renderBank() {
                const bank = document.getElementById("image-bank");
                bank.innerHTML = "";
                setupDropContainer(bank);
                updateGlobalAspectClass();

                state.bank.forEach((src) => {
                    bank.appendChild(createImageWrapperElement(src));
                });
            }

            function createImageWrapperElement(src) {
                const wrapper = document.createElement("div");
                wrapper.className = "tier-item-wrap";

                const img = document.createElement("img");
                img.src = src;
                img.className = `tier-item-img fit-${state.settings.aspectRatio}`;
                img.draggable = true;

                // Open context window modal on click
                img.addEventListener("click", (e) => {
                    e.stopPropagation();
                    openItemModal(wrapper);
                });

                img.addEventListener("dragstart", (e) => {
                    SilverDraggedElement = img;
                    img.style.opacity = "0.4";
                    setTimeout(() => {
                        wrapper.style.opacity = "0.2";
                    }, 0);
                });

                img.addEventListener("dragend", () => {
                    SilverDraggedElement = null;
                    img.style.opacity = "1";
                    wrapper.style.opacity = "1";
                    syncStateFromDOM();
                });

                wrapper.appendChild(img);

                // Re-append text tooltips if descriptive details exist inside state data properties
                if (state.descriptions[src]) {
                    const tooltip = document.createElement("div");
                    tooltip.className = "item-tooltip";
                    tooltip.innerText = state.descriptions[src];
                    wrapper.appendChild(tooltip);
                }

                return wrapper;
            }

            function moveTierOrder(index, direction) {
                syncStateFromDOM();
                const targetIndex = index + direction;
                if (targetIndex >= 0 && targetIndex < state.tiers.length) {
                    const temp = state.tiers[index];
                    state.tiers[index] = state.tiers[targetIndex];
                    state.tiers[targetIndex] = temp;
                    renderBoard();
                }
            }

            // --- Drag & Drop Tracking Controls (Flicker Fix Applied Here) ---

            function setupDropContainer(container) {
                container.addEventListener("dragover", (e) => {
                    e.preventDefault();
                    if (!SilverDraggedElement) return;

                    const targetWrap =
                        SilverDraggedElement.closest(".tier-item-wrap");
                    const afterElement = getDragAfterElement(
                        container,
                        e.clientX,
                        e.clientY,
                    );

                    if (afterElement == null) {
                        container.appendChild(targetWrap);
                    } else {
                        container.insertBefore(targetWrap, afterElement);
                    }
                });
            }

            function getDragAfterElement(container, x, y) {
                const draggableElements = [
                    ...container.querySelectorAll(
                        ".tier-item-wrap:not(:focus-within)",
                    ),
                ];

                // FLICKER FIX: Sort targets by spatial line breaks relative to current cursor index placement
                return draggableElements.reduce(
                    (closest, child) => {
                        const img = child.querySelector(".tier-item-img");
                        if (img === SilverDraggedElement) return closest;

                        const box = child.getBoundingClientRect();

                        // Check if the cursor is vertically matching the bounding height box rows space environment
                        const insideVerticalBounds =
                            y >= box.top && y <= box.bottom;

                        if (insideVerticalBounds) {
                            // Sort linearly horizontally across grid structures
                            const offset = x - (box.left + box.width / 2);
                            if (offset < 0 && offset > closest.offset) {
                                return { offset: offset, element: child };
                            } else {
                                return closest;
                            }
                        } else {
                            // Fallback sorting criteria algorithm parameters if sorting row heights ranges mismatch
                            const distance = Math.hypot(
                                x - (box.left + box.width / 2),
                                y - (box.top + box.height / 2),
                            );
                            if (
                                !closest.insideRow &&
                                distance < closest.distance
                            ) {
                                return {
                                    offset: Number.NEGATIVE_INFINITY,
                                    distance: distance,
                                    element: child,
                                    insideRow: false,
                                };
                            }
                            return closest;
                        }
                    },
                    {
                        offset: Number.NEGATIVE_INFINITY,
                        distance: Number.POSITIVE_INFINITY,
                        element: null,
                        insideRow: true,
                    },
                ).element;
            }

            function syncStateFromDOM() {
                document.querySelectorAll(".tier-row").forEach((row) => {
                    const id = row.dataset.id;
                    const targetTier = state.tiers.find((t) => t.id === id);
                    if (targetTier) {
                        targetTier.images = [
                            ...row.querySelectorAll(".tier-item-img"),
                        ].map((img) => img.src);
                    }
                });
                state.bank = [
                    ...document
                        .getElementById("image-bank")
                        .querySelectorAll(".tier-item-img"),
                ].map((img) => img.src);
            }
        </script>
    </body>
